<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل وخلاص عن بعد</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
  <div class="container py-5">
    <div class="text-center mb-4">
      <!-- صورة طبيب/طبيبة (يمكنك تغيير الرابط بصورة حقيقية لاحقاً) -->
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='40' r='25' fill='%23a0d2f0'/%3E%3Crect x='35' y='65' width='30' height='25' rx='5' fill='%23a0d2f0'/%3E%3Ctext x='50' y='55' text-anchor='middle' font-size='30'%3E👩‍⚕️%3C/text%3E%3C/svg%3E"
           alt="طبيب" width="120" class="mb-3">
      <h2 class="fw-bold text-primary">المستشفى العمومي – تسجيل وخلاص عن بعد</h2>
      <p class="text-muted">أدخل معلوماتك لتحصل على شهادة QR تثبت الخلاص</p>
    </div>

    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
      <div class="card-body">
        <form id="registrationForm">
          <div class="mb-3">
            <label class="form-label">الاسم</label>
            <input type="text" id="nom" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">اللقب</label>
            <input type="text" id="prenom" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">رقم بطاقة التعريف الوطنية</label>
            <input type="text" id="cin" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">رقم الهاتف</label>
            <input type="tel" id="telephone" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3">تسجيل وخلاص (محاكاة الدفع)</button>
        </form>

        <!-- مكان عرض QR -->
        <div id="resultSection" class="d-none text-center mt-4">
          <h5 class="text-success">تم التسجيل بنجاح!</h5>
          <img id="qrImage" src="" alt="QR Code" class="img-fluid border p-2 mb-2">
          <br>
          <a id="downloadLink" href="#" download="QR_Code.png" class="btn btn-outline-primary btn-sm">حفظ الصورة</a>
        </div>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="admin.html" class="text-secondary">دخول الإدارة</a>
    </div>
  </div>

  <script>
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        nom: document.getElementById('nom').value.trim(),
        prenom: document.getElementById('prenom').value.trim(),
        cin: document.getElementById('cin').value.trim(),
        telephone: document.getElementById('telephone').value.trim()
      };

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (result.success) {
          // عرض QR
          document.getElementById('qrImage').src = result.qrCode;
          document.getElementById('downloadLink').href = result.qrCode;
          document.getElementById('resultSection').classList.remove('d-none');
        } else {
          alert('خطأ: ' + (result.error || 'فشل التسجيل'));
        }
      } catch (err) {
        alert('تعذر الاتصال بالسيرفر');
      }
    });
  </script>
</body>
</html>
