<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل وخلاص عن بعد – المستشفى العمومي</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="text-center mb-4">
      <!-- استخدمنا صورة جماعية لأطباء (يمكنك وضع صورتك في public/images/hero-doctors.jpg) -->
      <img src="images/hero-doctors.jpg" alt="فريق الأطباء" class="hero-img" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'40\' r=\'25\' fill=\'%23a0d2f0\'/%3E%3Ctext x=\'50\' y=\'55\' text-anchor=\'middle\' font-size=\'30\'%3E👩‍⚕️%3C/text%3E%3C/svg%3E';">
      <h1 class="fw-bold mt-2">المستشفى العمومي</h1>
      <p class="lead text-muted">تسجيل وخلاص عن بعد – وفر وقتك وتجنب الاكتظاظ</p>
    </div>

    <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 600px;">
      <div class="card-body p-4">
        <form id="registrationForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">الاسم *</label>
              <input type="text" id="nom" class="form-control" placeholder="الاسم" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">اللقب *</label>
              <input type="text" id="prenom" class="form-control" placeholder="اللقب" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">رقم بطاقة التعريف *</label>
              <input type="text" id="cin" class="form-control" placeholder="XXXX-XXXX-XXXX" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">رقم الهاتف *</label>
              <input type="tel" id="telephone" class="form-control" placeholder="06XXXXXXXX" required>
            </div>
            <div class="col-12">
              <label class="form-label">البريد الإلكتروني *</label>
              <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">المستشفى *</label>
              <select id="hopital" class="form-select" required>
                <option value="">-- اختر المستشفى --</option>
                <option value="المستشفى الجامعي ابن رشد">المستشفى الجامعي ابن رشد</option>
                <option value="مستشفى الحسيني">مستشفى الحسيني</option>
                <option value="مستشفى الأم والطفل">مستشفى الأم والطفل</option>
                <option value="مستشفى الأمراض الصدرية">مستشفى الأمراض الصدرية</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">القسم *</label>
              <select id="departement" class="form-select" required>
                <option value="">-- اختر القسم --</option>
                <option value="الطب العام">الطب العام</option>
                <option value="طب الأطفال">طب الأطفال</option>
                <option value="النساء والتوليد">النساء والتوليد</option>
                <option value="الجراحة">الجراحة</option>
                <option value="العظام">العظام</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-success btn-lg w-100 mt-4">تسجيل وخلاص (محاكاة الدفع)</button>
        </form>

        <!-- عرض النتيجة و QR -->
        <div id="resultSection" class="d-none text-center mt-4">
          <div class="alert alert-success">
            <h5>✅ تم التسجيل والخلاص بنجاح!</h5>
            <p id="emailMsg"></p>
          </div>
          <img id="qrImage" src="" alt="QR Code" class="img-fluid qr-border mb-2">
          <br>
          <a id="downloadLink" href="#" download="QR_Code.png" class="btn btn-outline-primary">حفظ الصورة</a>
        </div>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="admin.html" class="text-secondary">دخول الإدارة</a>
    </div>
  </div>

  <script>
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        nom: document.getElementById('nom').value.trim(),
        prenom: document.getElementById('prenom').value.trim(),
        cin: document.getElementById('cin').value.trim(),
        telephone: document.getElementById('telephone').value.trim(),
        email: document.getElementById('email').value.trim(),
        hopital: document.getElementById('hopital').value,
        departement: document.getElementById('departement').value
      };

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (result.success) {
          document.getElementById('qrImage').src = result.qrCode;
          document.getElementById('downloadLink').href = result.qrCode;
          document.getElementById('emailMsg').textContent = result.message;
          document.getElementById('resultSection').classList.remove('d-none');
        } else {
          alert('خطأ: ' + (result.error || 'فشل التسجيل'));
        }
      } catch (err) {
        alert('تعذر الاتصال بالسيرفر');
      }
    });
  </script>
</body>
</html>
