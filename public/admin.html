<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة – المستشفى</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h2 class="text-center mb-4">لوحة إدارة المواعيد</h2>
    <div class="mb-3">
      <input type="password" id="adminPassword" class="form-control" placeholder="كلمة سر الإدارة" style="max-width: 300px;">
      <button id="loadDataBtn" class="btn btn-primary mt-2">تحميل التسجيلات</button>
    </div>

    <div id="errorMsg" class="alert alert-danger d-none"></div>
    <table class="table table-bordered bg-white d-none" id="dataTable">
      <thead>
        <tr>
          <th>الاسم واللقب</th>
          <th>رقم الهاتف</th>
          <th>بطاقة التعريف</th>
          <th>الحالة</th>
          <th>الموعد</th>
          <th>إجراء</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    let registrations = [];
    const passwordInput = document.getElementById('adminPassword');
    const loadBtn = document.getElementById('loadDataBtn');
    const errorDiv = document.getElementById('errorMsg');
    const table = document.getElementById('dataTable');
    const tbody = document.getElementById('tableBody');

    loadBtn.addEventListener('click', async () => {
      const pwd = passwordInput.value.trim();
      if (!pwd) return alert('أدخل كلمة السر');
      try {
        const res = await fetch('/api/admin/registrations', {
          headers: { 'Authorization': `Bearer ${pwd}` }
        });
        if (!res.ok) {
          errorDiv.textContent = 'كلمة السر غير صحيحة أو انتهت الصلاحية';
          errorDiv.classList.remove('d-none');
          table.classList.add('d-none');
          return;
        }
        registrations = await res.json();
        errorDiv.classList.add('d-none');
        renderTable();
      } catch (e) {
        errorDiv.textContent = 'فشل الاتصال';
        errorDiv.classList.remove('d-none');
      }
    });

    function renderTable() {
      tbody.innerHTML = '';
      registrations.forEach(reg => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${reg.nom} ${reg.prenom}</td>
          <td>${reg.telephone}</td>
          <td>${reg.cin}</td>
          <td>${reg.paye ? '✅ مسدد' : '❌ غير مسدد'}</td>
          <td>
            <input type="datetime-local" value="${reg.rendezVous || ''}" class="form-control form-control-sm" id="rdv-${reg.id}">
          </td>
          <td>
            <button class="btn btn-sm btn-success mb-1" onclick="setAppointment('${reg.id}')">تحديد الموعد</button>
            <button class="btn btn-sm btn-info" onclick="sendSMS('${reg.id}')">إرسال SMS وهمي</button>
          </td>
        `;
        tbody.appendChild(row);
      });
      table.classList.remove('d-none');
    }

    async function setAppointment(id) {
      const dateInput = document.getElementById(`rdv-${id}`);
      if (!dateInput.value) return alert('اختر التاريخ والوقت');
      const pwd = passwordInput.value.trim();
      await fetch('/api/admin/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${pwd}` },
        body: JSON.stringify({ id, dateRdv: dateInput.value })
      });
      alert('تم تحديد الموعد');
      loadBtn.click(); // تحديث
    }

    async function sendSMS(id) {
      const pwd = passwordInput.value.trim();
      const res = await fetch('/api/admin/send-sms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${pwd}` },
        body: JSON.stringify({ id })
      });
      const data = await res.json();
      if (data.success) {
        alert('📱 SMS تجريبي:\n' + data.sms);
      } else {
        alert('خطأ: ' + data.error);
      }
    }
  </script>
</body>
</html>
