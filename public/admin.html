<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة – المستشفى العمومي</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold">لوحة إدارة المواعيد</h2>
      <p class="text-muted">يمكنك تحديد المواعيد وإرسال الإشعارات</p>
    </div>

    <div class="card shadow-sm rounded-4 mb-4">
      <div class="card-body">
        <div class="row align-items-end">
          <div class="col-md-4 mb-2">
            <input type="password" id="adminPassword" class="form-control" placeholder="كلمة سر الإدارة">
          </div>
          <div class="col-md-2 mb-2">
            <button id="loadDataBtn" class="btn btn-primary w-100">تحميل القائمة</button>
          </div>
        </div>
      </div>
    </div>

    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <div class="card shadow-sm rounded-4 d-none" id="tableCard">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-primary">
            <tr>
              <th>الاسم</th>
              <th>الهاتف</th>
              <th>البريد</th>
              <th>المستشفى / القسم</th>
              <th>الموعد</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let registrations = [];
    const passwordInput = document.getElementById('adminPassword');
    const loadBtn = document.getElementById('loadDataBtn');
    const errorDiv = document.getElementById('errorMsg');
    const tableCard = document.getElementById('tableCard');
    const tbody = document.getElementById('tableBody');

    loadBtn.addEventListener('click', async () => {
      const pwd = passwordInput.value.trim();
      if (!pwd) return alert('أدخل كلمة السر');
      try {
        const res = await fetch('/api/admin/registrations', {
          headers: { 'Authorization': `Bearer ${pwd}` }
        });
        if (!res.ok) {
          errorDiv.textContent = 'كلمة السر غير صحيحة';
          errorDiv.classList.remove('d-none');
          tableCard.classList.add('d-none');
          return;
        }
        registrations = await res.json();
        errorDiv.classList.add('d-none');
        renderTable();
      } catch (e) {
        errorDiv.textContent = 'فشل الاتصال';
        errorDiv.classList.remove('d-none');
      }
    });

    function renderTable() {
      tbody.innerHTML = '';
      registrations.forEach(reg => {
        const row = document.createElement('tr');
        const rdvValue = reg.rendez_vous ? new Date(reg.rendez_vous).toISOString().slice(0,16) : '';
        row.innerHTML = `
          <td>${reg.nom} ${reg.prenom}</td>
          <td>${reg.telephone}</td>
          <td>${reg.email || ''}</td>
          <td>${reg.hopital} - ${reg.departement}</td>
          <td>
            <input type="datetime-local" value="${rdvValue}" class="form-control form-control-sm" id="rdv-${reg.id}">
          </td>
          <td>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-success" onclick="setAppointment('${reg.id}')">تحديد</button>
              <button class="btn btn-outline-info" onclick="sendSMS('${reg.id}')">SMS وهمي</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
      tableCard.classList.remove('d-none');
    }

    async function setAppointment(id) {
      const dateInput = document.getElementById(`rdv-${id}`);
      if (!dateInput.value) return alert('اختر التاريخ والوقت');
      const pwd = passwordInput.value.trim();
      const res = await fetch('/api/admin/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${pwd}` },
        body: JSON.stringify({ id, dateRdv: dateInput.value })
      });
      const data = await res.json();
      if (data.success) {
        alert('تم تحديد الموعد وإرسال إشعار للمريض');
        loadBtn.click();
      } else {
        alert('خطأ: ' + data.error);
      }
    }

    async function sendSMS(id) {
      const pwd = passwordInput.value.trim();
      const res = await fetch('/api/admin/send-sms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${pwd}` },
        body: JSON.stringify({ id })
      });
      const data = await res.json();
      if (data.success) alert('📱 SMS (محاكاة): ' + data.sms);
      else alert('خطأ: ' + data.error);
    }
  </script>
</body>
</html>
